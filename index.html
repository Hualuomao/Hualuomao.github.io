        .modal-bg { background-color: rgba(0, 0, 0, 0.6); backdrop-filter: blur(10px); }
        #timer-bar { transition: width 1s linear; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade { animation: fadeIn 0.4s ease-out forwards; }
        
        .scrollable-container {
            max-height: 85vh;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: thin;
        }
        
        .scrollable-container::-webkit-scrollbar {
            width: 5px;
        }
        .scrollable-container::-webkit-scrollbar-track {
            background: rgba(0,0,0,0.05);
            border-radius: 10px;
        }
        .scrollable-container::-webkit-scrollbar-thumb {

                    { q: "重庆轨道第四期建设规划包含多少条线路？", options: [{ t: "4条(含延伸段)", score: 10 }, { t: "7条", score: 0 }, { t: "2条", score: 0 }, { t: "5条", score: 0 }] },
                    { q: "以下哪个车站原先设计为“侧式站台”后改为岛式？", options: [{ t: "大溪沟站(2号线)", score: 10 }, { t: "佛图关站", score: 0 }, { t: "黄花园站", score: 0 }, { t: "曾家岩站", score: 0 }] },
                    { q: "“国博线”最初是6号线的支线，目前独立运营，识别色为？", options: [{ t: "浅湖蓝(沿用6号线支线色)", score: 10 }, { t: "暗紫色", score: 0 }, { t: "银灰色", score: 0 }, { t: "橙红色", score: 0 }] },
                    { q: "5号线和环线在“重庆西站”换乘方式是？", options: [{ t: "同台换乘", score: 10 }, { t: "长通道换乘", score: 0 }, { t: "出站换乘", score: 0 }, { t: "跨站台楼梯", score: 0 }] },
                    { q: "跨座式单轨轨道梁的曲线半径最小值是多少？", options: [{ t: "100米", score: 10 }, { t: "50米", score: 0 }, { t: "200米", score: 0 }, { t: "300米", score: 0 }] },
                    { q: "重庆轨道交通线网中第一条GoA4全自动运行线路是？", options: [{ t: "9号线(二期)", score: 10 }, { t: "18号线", score: 0 }, { t: "4号线二期", score: 0 }, { t: "江跳线", score: 0 }] },
                    { q: "“环线”闭合运营时总长度约为？", options: [{ t: "51公里", score: 10 }, { t: "34公里", score: 0 }, { t: "70公里", score: 0 }, { t: "44公里", score: 0 }] },
                    { q: "2号线曾家岩站为全国首个？", options: [{ t: "桥上轨道交通车站", score: 10 }, { t: "地下叠落车站", score: 0 }, { t: "玻璃穹顶车站", score: 0 }, { t: "四线换乘站", score: 0 }] },
                    { q: "重庆轨道交通车辆检修基地“童家院子”主要服务于？", options: [{ t: "3号线单轨", score: 10 }, { t: "1号线", score: 0 }, { t: "环线", score: 0 }, { t: "6号线", score: 0 }] },
                    { q: "以下哪个枢纽是4、5、环线的三角换乘？", options: [{ t: "民安大道站", score: 10 }, { t: "重庆北站", score: 0 }, { t: "冉家坝", score: 0 }, { t: "大龙山", score: 0 }] },
                    { q: "“江跳线”使用的双流制列车在哪个站进行交直流转换？", options: [{ t: "跳蹬站", score: 10 }, { t: "石林寺", score: 0 }, { t: "九龙园", score: 0 }, { t: "江津高铁站", score: 0 }] },
                    { q: "重庆轨道交通LOGO于哪一年正式发布？", options: [{ t: "2011年", score: 10 }, { t: "2005年", score: 0 }, { t: "2015年", score: 0 }, { t: "2008年", score: 0 }] }
                ],
                // 第三套 运营细节与技术迭代
                [
                    { q: "单轨3号线采用何种编组应对大客流？", options: [{ t: "6节/8节混跑", score: 10 }, { t: "全8节固定", score: 0 }, { t: "4节", score: 0 }, { t: "10节", score: 0 }] },
                    { q: "重庆轨道交通最高海拔高差超过？", options: [{ t: "200米", score: 10 }, { t: "100米", score: 0 }, { t: "300米", score: 0 }, { t: "400米", score: 0 }] },
                    { q: "6号线蔡家嘉陵江轨道专用桥采用的结构？", options: [{ t: "双塔斜拉桥", score: 10 }, { t: "连续刚构", score: 0 }, { t: "悬索桥", score: 0 }, { t: "拱式组合", score: 0 }] },
                    { q: "以下哪个技术是单轨列车能量回馈系统？", options: [{ t: "再生制动逆变回网", score: 10 }, { t: "飞轮储能", score: 0 }, { t: "氢燃料电池", score: 0 }, { t: "电容储能", score: 0 }] },
                    { q: "4号线二期(唐家沱-黄岭)采用的列车最高速度？", options: [{ t: "100km/h", score: 10 }, { t: "80km/h", score: 0 }, { t: "120km/h", score: 0 }, { t: "90km/h", score: 0 }] },
                    { q: "环线信号系统供应商是？", options: [{ t: "通号国铁", score: 10 }, { t: "卡斯柯", score: 0 }, { t: "泰雷兹", score: 0 }, { t: "华为", score: 0 }] },
                    { q: "重庆单轨PC轨道梁表面铺设的走行面材料是？", options: [{ t: "高耐磨钢板/聚氨酯", score: 10 }, { t: "混凝土磨耗层", score: 0 }, { t: "橡胶板", score: 0 }, { t: "不锈钢板", score: 0 }] },
                    { q: "哪条线路首次在重庆采用“全封闭式站台门(PSD)”？", options: [{ t: "环线", score: 10 }, { t: "1号线", score: 0 }, { t: "3号线", score: 0 }, { t: "2号线", score: 0 }] },
                    { q: "单轨2号线列车使用的集电靴受流电压等级为？", options: [{ t: "DC 750V", score: 10 }, { t: "DC 1500V", score: 0 }, { t: "AC 380V", score: 0 }, { t: "DC 3000V", score: 0 }] },
                    { q: "9号线列车采用何种减震降噪设计？", options: [{ t: "全包覆隔音裙板", score: 10 }, { t: "气囊悬挂", score: 0 }, { t: "主动降噪", score: 0 }, { t: "橡胶车轮", score: 0 }] },
                    { q: "重庆轨道交通应急通信主要使用？", options: [{ t: "TETRA数字集群", score: 10 }, { t: "普通手机信号", score: 0 }, { t: "卫星电话", score: 0 }, { t: "短波电台", score: 0 }] },
                    { q: "以下哪个车站拥有“同站台连续换乘”设计？", options: [{ t: "小龙坎(1/9号线)", score: 10 }, { t: "大坪", score: 0 }, { t: "较场口", score: 0 }, { t: "牛角沱", score: 0 }] },
                    { q: "单轨3号线道岔设备主要类型为？", options: [{ t: "平移式关节道岔", score: 10 }, { t: "转辙式", score: 0 }, { t: "升降式", score: 0 }, { t: "摆渡式", score: 0 }] },
                    { q: "重庆轨道交通线网最大断面客流出现在哪条线？", options: [{ t: "3号线(华新街-红旗河沟)", score: 10 }, { t: "1号线", score: 0 }, { t: "环线", score: 0 }, { t: "6号线", score: 0 }] },
                    { q: "10号线采用的列车牵引系统制造商是？", options: [{ t: "中车时代电气", score: 10 }, { t: "ABB", score: 0 }, { t: "西门子", score: 0 }, { t: "阿尔斯通", score: 0 }] }
                ]
            ]
        };

        // 重庆轨道交通线路标准色 (HEX)
        const LINE_COLORS = {
            "1": "#E4002B",   // 石榴红
            "2": "#007A33",   // 森林绿
            "3": "#003DA5",   // 琉璃蓝
            "4": "#DC8633",   // 鲜橙黄
            "5": "#00A3E0",   // 浅葱蓝
            "6": "#F67599",   // 谦粉红
            "0": "#F2A900",   // 柠檬黄
            "9": "#862041",   // 棕色
            "10": "#5F249F",  // 紫罗兰
            "18": "#2CD5C4"   // 初音绿
        };

        // 线路人物画像（本命线路文案）
        const PROFILES = {
            "2": { name: "2号线 · 单轨先驱", desc: "你是山城重庆的先行者，跨座式单轨的浪漫与魔幻刻在基因里。性格稳中带酷，懂得在喧嚣中穿楼而过，活出自己的风景。", class: "line-2" },
            "1": { name: "1号线 · 东西动脉", desc: "赤红如焰，贯通大学城至朝天门。你兼具文化沉淀与商业魄力，可靠而有冲劲，是团队中的定心骨。", class: "line-1" },
            "3": { name: "3号线 · 琉璃巨龙", desc: "全世界最繁忙的单轨线路，你拥有超强承载力和包容心，雷厉风行，连接南北，生活中总扮演关键枢纽角色。", class: "line-3" },
            "6": { name: "6号线 · 谦粉优雅", desc: "柔中带刚，串联茶园与北碚。你审美独到，浪漫务实，总能在繁杂中保持从容和优雅。", class: "line-6" },
            "5": { name: "5号线 · 浅葱劲旅", desc: "代表新兴力量，跨越嘉陵江和长江。你敢于突破，永远用最高效的方式抵达目标，是创新实干派。", class: "line-5" },
            "4": { name: "4号线 · 橙光枢纽", desc: "连接龙兴与核心区，性格开朗，充满热忱。你擅长串联资源，让周围人感受到满满活力。", class: "line-4" },
            "0": { name: "环线 · 黄金纽带", desc: "你像环线一样周全，社交达人，无处不在。做事闭环，情商极高，能把一切安排得井井有条。", class: "line-0" },
            "10": { name: "10号线 · 极速快线", desc: "高效直连机场与南岸，你追求速度与精准，目标导向，雷厉风行，天生属于快节奏赢家。", class: "line-10" },
            "9": { name: "9号线 · 棕色科技", desc: "智商在线，充满未来感。你冷静、睿智，总能从新角度解决复杂问题。", class: "line-9" },
            "18": { name: "18号线 · 新生之力", desc: "跳蹬南至富华路，新晋实力派。你富有探索精神，拥抱变化，正在开创属于自己的传奇。", class: "line-18" }
        };

        let state = {
            view: 'menu',
            mode: 'easy',
            currentQuestions: [],
            currentIdx: 0,
            score: 0,
            timer: null,
            timeLeft: 15
        };

        function shuffle(array) {
            const arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function closeDisclaimer() {
            document.getElementById('disclaimer-modal').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
            app.init();
        }

        const app = {
            init() { this.render(); },
            render() {
                const container = document.getElementById('main-container');
                if (!container) return;
                container.innerHTML = '';
                if (state.view === 'menu') this.renderMenu(container);
                else if (state.view === 'quiz') this.renderQuiz(container);
                else if (state.view === 'result') this.renderResult(container);
            },
            renderMenu(container) {
                const high = localStorage.getItem('cq_metro_high_score') || 0;
                container.innerHTML = `
                    <div class="metro-gradient p-12 text-white text-center animate-fade">
                        <div class="inline-block px-3 py-1 bg-white/20 rounded-full text-[10px] font-bold tracking-widest uppercase mb-4">⛰️ 魔幻立体交通</div>
                        <h1 class="text-3xl font-black mb-2 tracking-tighter">重庆轨道交通测验</h1>
                        <p class="text-xs opacity-60">穿楼跨江 · 单轨As型车 · 你是哪条线？</p>
                    </div>
                    <div class="p-8 animate-fade">
                        <div class="flex justify-between items-center mb-8">
                            <h2 class="text-xl font-bold text-gray-800">选择难度</h2>
                            <div class="text-xs text-gray-400 bg-gray-50 px-3 py-1 rounded-full border border-gray-100">最高分: ${high}</div>
                        </div>
                        <div class="space-y-4 pb-6">
                            <button onclick="app.startQuiz('easy')" class="w-full text-left p-6 rounded-[2rem] border-2 border-emerald-50 bg-white/40 hover:border-emerald-500 hover:bg-white transition-all shadow-sm">
                                <h3 class="text-lg font-bold text-emerald-700">🟢 轻松 · 山城漫步</h3>
                                <p class="text-xs text-gray-500 mt-2">线路站点、景点常识、基础换乘。</p>
                            </button>
                            <button onclick="app.startQuiz('hard')" class="w-full text-left p-6 rounded-[2rem] border-2 border-rose-50 bg-white/40 hover:border-rose-500 hover:bg-white transition-all shadow-sm">
                                <h3 class="text-lg font-bold text-rose-700">🔴 硬核 · 轨道专家</h3>
                                <p class="text-xs text-gray-500 mt-2">单轨技术、信号工程、发展史、As型车参数。</p>
                            </button>
                        </div>
                    </div>
                `;
            },
            startQuiz(mode) {
                if (state.timer) clearInterval(state.timer);
                state.view = 'quiz';
                state.mode = mode;
                state.currentIdx = 0;
                state.score = 0;
                const pool = QUESTION_POOLS[mode];
                const randomSet = pool[Math.floor(Math.random() * pool.length)];
                state.currentQuestions = randomSet;
                this.render();
            },
            startTimer() {
                if (state.timer) clearInterval(state.timer);
                state.timeLeft = 15;
                const bar = document.getElementById('timer-bar');
                if (bar) bar.style.width = '100%';
                state.timer = setInterval(() => {
                    state.timeLeft--;
                    const currentBar = document.getElementById('timer-bar');
                    if (currentBar) currentBar.style.width = (state.timeLeft / 15 * 100) + '%';
                    if (state.timeLeft <= 0) {
                        clearInterval(state.timer);
                        this.submitAnswer({ score: 0 });
                    }
                }, 1000);
            },
            submitAnswer(opt) {
                clearInterval(state.timer);
                state.score += (opt.score || 0);
                if (state.currentIdx < state.currentQuestions.length - 1) {
                    state.currentIdx++;
                    this.render();
                } else {
                    state.view = 'result';
                    this.render();
                }
            },
            renderQuiz(container) {
                const q = state.currentQuestions[state.currentIdx];
                const shuffledOpts = shuffle(q.options);
                const progress = ((state.currentIdx + 1) / state.currentQuestions.length) * 100;
                container.innerHTML = `
                    <div class="p-8 flex flex-col min-h-full">
                        <div class="w-full h-1 bg-gray-100 rounded-full mb-8 overflow-hidden">
                            <div id="timer-bar" class="h-full bg-blue-600 w-full" style="width:100%"></div>
                        </div>
                        <div class="flex justify-between items-start mb-8 flex-wrap gap-2">
                            <div>
                                <span class="text-[10px] font-black text-blue-600 uppercase tracking-widest">Question ${state.currentIdx + 1} / 15</span>
                                <h3 class="text-2xl font-black text-gray-900 mt-1">${state.mode === 'easy' ? '轻松模式' : '硬核模式'}</h3>
                            </div>
                            <div class="text-right"><div class="text-2xl font-black text-gray-200">${Math.round(progress)}%</div></div>
                        </div>
                        <div class="flex-grow"><h2 class="text-lg font-bold text-gray-800 mb-8 leading-relaxed">${q.q}</h2>
                        <div id="options-container" class="space-y-3 pb-6"></div></div>
                    </div>
                `;
                const box = container.querySelector('#options-container');
                if (box) {
                    shuffledOpts.forEach((opt, idx) => {
                        const btn = document.createElement('button');
                        btn.className = "w-full text-left p-5 rounded-2xl border border-gray-100 bg-white/60 hover:border-blue-600 hover:bg-white hover:shadow-xl hover:-translate-y-1 transition-all flex items-center group option-btn";
                        btn.onclick = () => this.submitAnswer(opt);
                        btn.innerHTML = `<div class="w-10 h-10 rounded-xl bg-gray-50 group-hover:bg-blue-600 group-hover:text-white flex items-center justify-center mr-4 text-xs font-black transition-colors shrink-0">${String.fromCharCode(65+idx)}</div><span class="text-gray-600 font-bold group-hover:text-blue-900 text-sm leading-tight">${opt.t}</span>`;
                        box.appendChild(btn);
                    });
                }
                this.startTimer();
            },
            renderResult(container) {
                const high = localStorage.getItem('cq_metro_high_score') || 0;
                if (state.score > high) localStorage.setItem('cq_metro_high_score', state.score);
                let destinyId = "2";
                const s = state.score;
                if (s >= 140) destinyId = "18";
                else if (s >= 128) destinyId = "9";
                else if (s >= 115) destinyId = "10";
                else if (s >= 102) destinyId = "0";
                else if (s >= 90) destinyId = "4";
                else if (s >= 78) destinyId = "5";
                else if (s >= 66) destinyId = "6";
                else if (s >= 55) destinyId = "3";
                else if (s >= 44) destinyId = "1";
                else if (s >= 30) destinyId = "2";
                else destinyId = "2";
                const profile = PROFILES[destinyId] || PROFILES["2"];
                container.innerHTML = `
                    <div class="p-10 text-center animate-fade">
                        <div class="inline-block px-4 py-1 bg-blue-100 text-blue-700 rounded-full text-[10px] font-bold uppercase mb-6 tracking-widest">测验结束</div>
                        <div class="w-24 h-24 bg-white/80 rounded-full flex items-center justify-center mx-auto mb-6 shadow-xl border border-blue-50"><div class="text-4xl font-black text-blue-600">${state.score}</div></div>
                        <h2 class="text-xl font-bold text-gray-400 mb-2">根据得分，你的本命线路是</h2>
                        <div class="flex justify-center mb-6"><span class="px-8 py-3 rounded-full text-white text-2xl font-black shadow-lg" style="background-color: ${LINE_COLORS[destinyId] || '#555'}">${destinyId === '7' ? '环线' : destinyId + ' 号线'}</span></div>
                        <div class="p-8 rounded-[2rem] bg-white/50 border border-white mb-8 ${profile.class} shadow-inner text-left"><p class="text-gray-600 leading-relaxed text-sm font-medium italic">“${profile.desc}”</p></div>
                        <div class="grid grid-cols-2 gap-4 mb-8">
                            <div class="p-4 bg-gray-50/50 rounded-2xl border border-white text-center"><div class="text-[10px] text-gray-400 uppercase font-bold">正确率</div><div class="text-xl font-black text-gray-700">${Math.round(state.score/1.5)}%</div></div>
                            <div class="p-4 bg-gray-50/50 rounded-2xl border border-white text-center"><div class="text-[10px] text-gray-400 uppercase font-bold">最高纪录</div><div class="text-xl font-black text-gray-700">${high}</div></div>
                        </div>
                        <button onclick="location.reload()" class="w-full py-4 bg-gray-900 text-white rounded-2xl font-black hover:bg-black transition-all shadow-xl active:scale-95">再测一次</button>
                    </div>
                `;
            }
        };
        window.app = app;
        window.closeDisclaimer = closeDisclaimer;
    </script>
</body>
</html>
